<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-light mb-0">Archivio Preventivi</h2>
    <button (click)="creaNuovo()" class="btn btn-dark btn-sm px-4 rounded-pill">
      Nuovo Documento
    </button>
  </div>

  <div class="card shadow-sm border-0 bg-white rounded-4 overflow-hidden">
    <div class="px-4 pt-4 mb-3">
      <div class="input-group input-group-sm" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0 text-muted">
          <i class="bi bi-search"></i>
        </span>
        <input (ngModelChange)="searchTerm.set($event)"
               [ngModel]="searchTerm()"
               class="form-control border-start-0 ps-0 shadow-none"
               placeholder="Cerca cliente..."
               type="text">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead class="bg-light">
        <tr>
          <th class="ps-4 py-3 text-uppercase small fw-bold text-muted" style="letter-spacing: 1px;">ID</th>
          <th class="py-3 text-uppercase small fw-bold text-muted" style="letter-spacing: 1px;">Cliente</th>
          <th class="py-3 text-uppercase small fw-bold text-muted" style="letter-spacing: 1px;">Data</th>
          <th class="py-3 text-uppercase small fw-bold text-muted text-end" style="letter-spacing: 1px;">Totale</th>
          <th class="pe-4 py-3 text-uppercase small fw-bold text-muted text-center" style="letter-spacing: 1px;">
            Azioni
          </th>
        </tr>
        </thead>
        <tbody>
          @for (prev of filteredPreventivi(); track prev.invoiceNumber) {
            <tr class="hover-row">
              <td class="ps-4 py-3 font-monospace text-secondary small">{{ prev.invoiceNumber || '---' }}</td>
              <td class="py-3 fw-semibold text-dark">{{ prev.toName || 'Cliente anonimo' }}</td>
              <td class="py-3 text-muted small">{{ prev.date | date:'dd MMM yyyy' }}</td>
              <td class="py-3 text-end fw-bold text-dark">€ {{ prev.total | number:'1.2-2' }}</td>


              <td class="pe-4 py-3 text-center">
                <div class="d-flex justify-content-center gap-3">
                  <button (click)="visualizzaPreventivo(prev)" class="action-icon" title="Visualizza">
                    <i class="bi bi-eye"></i>
                  </button>

                  <button (click)="modificaPreventivo(prev)" class="action-icon" title="Modifica">
                    <i class="bi bi-pencil-square"></i>
                  </button>

                  <button (click)="eliminaPreventivo(prev.invoiceNumber)" class="action-icon text-danger-hover"
                          title="Elimina">
                    <i class="bi bi-trash3"></i>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
