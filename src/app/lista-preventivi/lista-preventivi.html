<!-- Div principale con stile tramite Bootstrap -->
<!-- container-fluid serve per estendere il contenuto su tutta la larghezza disponibile -->
<div class="container-fluid py-4">

  <!-- d-flex crea un contenitore flexbox -->
  <!-- justify-content-between distribuisce titolo e bottone agli estremi -->
  <!-- align-items-center allinea verticalmente gli elementi al centro -->
  <div class="d-flex justify-content-between align-items-center mb-5">

    <h2 class="mb-0">Archivio Preventivi</h2>

    <!-- Bottone per creare un nuovo documento -->
    <!-- al clik si attiva il metodo creaNuovo -->
    <button (click)="creaNuovo()" class="btn btn-dark btn-sm px-4 rounded-pill">
      Nuovo Documento
    </button>
  </div>

  <!-- Card principale che contiene barra ricerca + tabella -->
  <div class="card shadow border bg-white rounded-4 overflow-hidden">

    <!-- px-4 padding orizzontale -->
    <!-- pt-4 padding superiore -->
    <!-- mb-3 margine inferiore -->
    <div class="px-4 pt-4 mb-3">

      <!-- input-group per unire icona e input -->
      <!-- input-group-sm per dimensione compatta -->
      <!-- max-width limita la larghezza della barra di ricerca -->
      <div class="input-group input-group-sm" style="max-width: 300px;">

        <!-- input-group-text per contenere l'icona -->
        <span class="input-group-text bg-white border-end-0 text-muted">
          <i class="bi bi-search"></i>
        </span>

        <!-- ngModel per binding bidirezionale con searchTerm -->
        <!-- con ngModel possiamo aggiornare searchTerm ogni volta che l'utente digita qualcosa -->
        <!-- border-start-0 rimuove il bordo sinistro -->
        <!-- ps-0 rimuove padding sinistro -->
        <input (ngModelChange)="searchTerm.set($event)"
               [ngModel]="searchTerm()"
               class="form-control border-start-0 ps-0 shadow-none"
               placeholder="Cerca preventivo"
               type="text">
      </div>

    </div>

    <!-- table-responsive rende la tabella scrollabile orizzontalmente su schermi piccoli -->
    <div class="table-responsive">


      <table class="table align-middle mb-0">

        <!-- bg-light per intestazione con sfondo chiaro -->
        <thead class="bg-light">
        <tr>

          <!-- ps-4 padding sinistro -->
          <!-- py-3 padding verticale -->
          <!-- text-uppercase testo maiuscolo -->
          <th class="ps-4 py-3 text-uppercase small fw-bold text-center text-muted"
              style="width: 8%; letter-spacing: 1px;">
            ID
          </th>

          <th class="py-3 text-uppercase small fw-bold text-muted"
              style="width: 43%; letter-spacing: 1px;">
            Cliente
          </th>

          <th class="py-3 text-uppercase small fw-bold text-muted text-center"
              style="width: 16%; letter-spacing: 1px;">
            Data
          </th>

          <th class="py-3 text-uppercase small fw-bold text-muted text-end"
              style="width: 16%; letter-spacing: 1px;">
            Totale
          </th>

          <th class="pe-4 py-3 text-uppercase small fw-bold text-muted text-center"
              style="width: 17%; letter-spacing: 1px;">
            Azioni
          </th>

        </tr>
        </thead>

        <tbody>

        <!-- @for ciclo Angular per iterare sui preventivi filtrati -->
          @for (prev of filteredPreventivi(); track prev.invoiceNumber) {

            <tr class="hover-row">

              <td class="ps-4 py-3 font-monospace text-secondary small text-center">
                {{ prev.invoiceNumber || '---' }}
              </td>

              <td class="py-3 fw-semibold text-dark">
                {{ prev.toName || 'Cliente anonimo' }}
              </td>

              <!-- date pipe per formattazione -->
              <td class="py-3 text-muted small text-center">
                {{ prev.date | date:'dd MMM yyyy' }}
              </td>

              <!-- number pipe per formattazione 2 decimali -->
              <!-- text-end per allineamento numerico corretto -->
              <td class="py-3 text-end fw-bold text-dark">
                € {{ prev.total | number:'1.2-2' }}
              </td>

              <!-- colonna azioni -->
              <td class="pe-4 py-3 text-center">

                <div class="d-flex justify-content-center gap-3">

                  <!-- Pulsante Visualizza -->
                  <button (click)="visualizzaPreventivo(prev)"
                          class="action-icon"
                          title="Visualizza">
                    <i class="bi bi-eye"></i>
                  </button>

                  <!-- Pulsante Modifica -->
                  <button (click)="modificaPreventivo(prev)"
                          class="action-icon"
                          title="Modifica">
                    <i class="bi bi-pencil-square"></i>
                  </button>

                  <!-- Pulsante Elimina -->
                  <button (click)="eliminaPreventivo(prev)"
                          class="action-icon text-danger-hover"
                          title="Elimina">
                    <i class="bi bi-trash3"></i>
                  </button>

                </div>
              </td>
            </tr>
          }

        </tbody>
      </table>
    </div>
  </div>
</div>
